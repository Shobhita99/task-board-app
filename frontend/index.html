<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Task Board</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Smart Task Board</h1>
            <p class="subtitle">Organize tasks with AI-powered prioritization</p>
        </header>

        <!-- Progress Section -->
        <section class="progress-section">
            <div class="progress-header">
                <span>Progress</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
            </div>
            <div class="stats">
                <span>Total: <strong id="total-tasks">0</strong></span>
                <span>Completed: <strong id="completed-tasks">0</strong></span>
            </div>
        </section>

        <!-- Add Task Form -->
        <section class="add-task">
            <div class="input-group">
                <input
                    type="text"
                    id="task-input"
                    placeholder="What would you like to accomplish?"
                    maxlength="100"
                />
                <select id="priority-select">
                    <option value="0">Low Priority</option>
                    <option value="1" selected>Medium Priority</option>
                    <option value="2">High Priority</option>
                </select>
                <button id="add-btn">Add Task</button>
            </div>
        </section>

        <!-- Task List -->
        <section class="task-list-section">
            <h2>Your Tasks</h2>
            <div id="task-list" class="task-list"></div>
        </section>

        <!-- Empty State -->
        <div id="empty-state" class="empty-state">
            <span class="empty-icon">🎯</span>
            <p>No tasks yet. Add your first task above!</p>
            <small>Try adding a high-priority task to see smart sorting in action.</small>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
